<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entity-Relationship Diagram (ERD) - IP2 Schema</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', monospace; background: #020617; min-height: 100vh; padding: 2rem; color: white; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .pulse-dot { width: 12px; height: 12px; background: #fb7185; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-left: 1.75rem; }
    .diagram-container { background: rgba(15, 23, 42, 0.5); border-radius: 1rem; border: 1px solid #1e293b; padding: 1.5rem; overflow-x: auto; }
    svg { width: 100%; min-width: 1000px; display: block; }
    .footer { text-align: center; margin-top: 1.5rem; color: #475569; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-row">
        <div class="pulse-dot"></div>
        <h1>Entity-Relationship Diagram (ERD)</h1>
      </div>
      <p class="subtitle">Unified Data Schema showing Relationships between 4 Ingested Sources</p>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 600">
        <defs>
          <marker id="crowfoot-many" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
            <line x1="0" y1="5" x2="10" y2="5" stroke="#94a3b8" stroke-width="1.5"/>
            <line x1="10" y1="2" x2="10" y2="8" stroke="#94a3b8" stroke-width="1.5"/>
            <line x1="5" y1="2" x2="10" y2="5" stroke="#94a3b8" stroke-width="1.5"/>
            <line x1="5" y1="8" x2="10" y2="5" stroke="#94a3b8" stroke-width="1.5"/>
          </marker>
          <marker id="crowfoot-one" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
            <line x1="0" y1="5" x2="10" y2="5" stroke="#94a3b8" stroke-width="1.5"/>
            <line x1="7" y1="2" x2="7" y2="8" stroke="#94a3b8" stroke-width="1.5"/>
            <line x1="4" y1="2" x2="4" y2="8" stroke="#94a3b8" stroke-width="1.5"/>
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- 1. MAIN DATASET TABLE (AAI_Main) -->
        <rect x="50" y="50" width="260" height="480" rx="8" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <path d="M 50 90 L 310 90" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="180" y="75" fill="white" font-size="12" font-weight="700" text-anchor="middle">AAI_Main_Dataset</text>
        
        <text x="65" y="115" fill="#22d3ee" font-size="10" font-weight="600">PK</text>
        <text x="95" y="115" fill="white" font-size="10" font-weight="600">Record_ID (String)</text>
        <text x="65" y="135" fill="#a78bfa" font-size="10" font-weight="600">FK</text>
        <text x="95" y="135" fill="white" font-size="10">Industry (String)</text>
        <text x="95" y="155" fill="#94a3b8" font-size="10">Organization_Size (String)</text>
        <text x="95" y="175" fill="#94a3b8" font-size="10">Leadership_Function (String)</text>
        <text x="95" y="195" fill="#94a3b8" font-size="10">AI_Maturity_Level (String)</text>
        <text x="95" y="215" fill="#94a3b8" font-size="10">Agent_Type (String)</text>
        <text x="95" y="235" fill="#94a3b8" font-size="10">Use_Case_Area (String)</text>
        <text x="95" y="255" fill="#94a3b8" font-size="10">Agent_Autonomy_Level (String)</text>
        <text x="95" y="275" fill="#94a3b8" font-size="10">Decision_Making_Type (String)</text>
        <text x="95" y="295" fill="#94a3b8" font-size="10">Context_Awareness_Score (Double)</text>
        <text x="95" y="315" fill="#94a3b8" font-size="10">Task_Complexity_Level (String)</text>
        <text x="95" y="335" fill="#94a3b8" font-size="10">Human_Oversight_Level (String)</text>
        <text x="95" y="355" fill="#94a3b8" font-size="10">Explainability_Level (String)</text>
        <text x="95" y="375" fill="#94a3b8" font-size="10">Data_Privacy_Compliance (String)</text>
        <text x="95" y="395" fill="#94a3b8" font-size="10">Integration_Level (String)</text>
        <text x="95" y="415" fill="#94a3b8" font-size="10">Task_Success_Rate (Double)</text>
        <text x="95" y="435" fill="#94a3b8" font-size="10">Response_Time_Seconds (Double)</text>
        <text x="95" y="455" fill="#94a3b8" font-size="10">Productivity_Improvement (Double)</text>
        <text x="95" y="475" fill="#94a3b8" font-size="10">Leadership_Trust_Score (Double)</text>
        <text x="95" y="495" fill="#94a3b8" font-size="10">Adoption_Success_Level (String)</text>

        <!-- 2. BENCHMARKS TABLE (Industry_Benchmarks) -->
        <rect x="520" y="50" width="280" height="150" rx="8" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <path d="M 520 90 L 800 90" stroke="#34d399" stroke-width="1.5"/>
        <text x="660" y="75" fill="white" font-size="12" font-weight="700" text-anchor="middle">Industry_Benchmarks</text>
        
        <text x="535" y="115" fill="#34d399" font-size="10" font-weight="600">PK</text>
        <text x="565" y="115" fill="white" font-size="10" font-weight="600">Industry (String)</text>
        <text x="565" y="135" fill="#94a3b8" font-size="10">Benchmark_Task_Success_Rate (Dbl)</text>
        <text x="565" y="155" fill="#94a3b8" font-size="10">Benchmark_Productivity_Imprv (Dbl)</text>
        <text x="565" y="175" fill="#94a3b8" font-size="10">Benchmark_Trust_Score (Double)</text>

        <!-- 3. EXECUTION LOGS TABLE (Agent_Execution_Logs) -->
        <rect x="520" y="240" width="280" height="170" rx="8" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
        <path d="M 520 280 L 800 280" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="660" y="265" fill="white" font-size="12" font-weight="700" text-anchor="middle">Agent_Execution_Logs</text>
        
        <text x="535" y="305" fill="#fbbf24" font-size="10" font-weight="600">PK</text>
        <text x="565" y="305" fill="white" font-size="10" font-weight="600">Record_ID (String)</text>
        <text x="565" y="325" fill="#94a3b8" font-size="10">Execution_Time_Minutes (Double)</text>
        <text x="565" y="345" fill="#94a3b8" font-size="10">Messages_Sent (Integer)</text>
        <text x="565" y="365" fill="#94a3b8" font-size="10">Memory_Usage_MB (Double)</text>
        <text x="565" y="385" fill="#94a3b8" font-size="10">CPU_Utilization_Percent (Double)</text>
        <text x="565" y="405" fill="#94a3b8" font-size="10">Error_Count (Integer)</text>

        <!-- RELATIONSHIPS -->
        <!-- AAI_Main.Industry -> Industry_Benchmarks.Industry (1-to-Many) -->
        <path d="M 310 135 L 410 135 L 410 115 L 512 115" fill="none" stroke="#94a3b8" stroke-width="1.5" 
              marker-start="url(#crowfoot-many)" marker-end="url(#crowfoot-one)"/>
        
        <!-- AAI_Main.Record_ID -> Agent_Execution_Logs.Record_ID (1-to-1) -->
        <path d="M 310 115 L 460 115 L 460 305 L 512 305" fill="none" stroke="#94a3b8" stroke-width="1.5" 
              marker-start="url(#crowfoot-one)" marker-end="url(#crowfoot-one)"/>

      </svg>
    </div>

    <!-- Footer -->
    <p class="footer">
      Individual Project ERD Schema Definition • Apache Spark Relational View
    </p>
  </div>
</body>
</html>
